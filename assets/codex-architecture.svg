<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620" role="img" aria-labelledby="title desc">
  <title id="title">The Codex architecture diagram</title>
  <desc id="desc">Data files feed loaders, graph views, documentary pages, planner utilities, Obsidian export, and offline PWA caching.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#132129"/>
      <stop offset="1" stop-color="#0b1117"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0" stop-color="#d8b45f"/>
      <stop offset="1" stop-color="#77b7d8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="960" height="620" rx="34" fill="url(#bg)"/>
  <g stroke="#f3ead7" stroke-opacity=".09">
    <path d="M0 80h960M0 160h960M0 240h960M0 320h960M0 400h960M0 480h960M0 560h960"/>
    <path d="M80 0v620M160 0v620M240 0v620M320 0v620M400 0v620M480 0v620M560 0v620M640 0v620M720 0v620M800 0v620M880 0v620"/>
  </g>
  <text x="52" y="70" fill="#d8b45f" font-family="Georgia, serif" font-size="42" font-weight="700">The Codex</text>
  <text x="54" y="104" fill="#a99f8e" font-family="Consolas, monospace" font-size="15">offline-first technology knowledge system</text>

  <g filter="url(#shadow)">
    <rect x="70" y="165" width="220" height="110" rx="18" fill="#1b2a31" stroke="#d8b45f" stroke-opacity=".45"/>
    <text x="95" y="210" fill="#f3ead7" font-family="Georgia, serif" font-size="25" font-weight="700">JSON entries</text>
    <text x="95" y="240" fill="#a99f8e" font-family="Consolas, monospace" font-size="14">80 technologies</text>

    <rect x="370" y="165" width="220" height="110" rx="18" fill="#1b2a31" stroke="#77b7d8" stroke-opacity=".45"/>
    <text x="395" y="210" fill="#f3ead7" font-family="Georgia, serif" font-size="25" font-weight="700">Loaders</text>
    <text x="395" y="240" fill="#a99f8e" font-family="Consolas, monospace" font-size="14">summaries + lazy detail</text>

    <rect x="670" y="165" width="220" height="110" rx="18" fill="#1b2a31" stroke="#70b982" stroke-opacity=".45"/>
    <text x="695" y="210" fill="#f3ead7" font-family="Georgia, serif" font-size="25" font-weight="700">React app</text>
    <text x="695" y="240" fill="#a99f8e" font-family="Consolas, monospace" font-size="14">tree + pages + search</text>

    <rect x="70" y="370" width="220" height="110" rx="18" fill="#1b2a31" stroke="#77b7d8" stroke-opacity=".45"/>
    <text x="95" y="415" fill="#f3ead7" font-family="Georgia, serif" font-size="25" font-weight="700">Planner</text>
    <text x="95" y="445" fill="#a99f8e" font-family="Consolas, monospace" font-size="14">scenario to build path</text>

    <rect x="370" y="370" width="220" height="110" rx="18" fill="#1b2a31" stroke="#d8b45f" stroke-opacity=".45"/>
    <text x="395" y="415" fill="#f3ead7" font-family="Georgia, serif" font-size="25" font-weight="700">Obsidian</text>
    <text x="395" y="445" fill="#a99f8e" font-family="Consolas, monospace" font-size="14">Markdown vault export</text>

    <rect x="670" y="370" width="220" height="110" rx="18" fill="#1b2a31" stroke="#bd5f3b" stroke-opacity=".45"/>
    <text x="695" y="415" fill="#f3ead7" font-family="Georgia, serif" font-size="25" font-weight="700">PWA cache</text>
    <text x="695" y="445" fill="#a99f8e" font-family="Consolas, monospace" font-size="14">offline survival mode</text>
  </g>

  <g fill="none" stroke="url(#gold)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M290 220h80"/>
    <path d="M590 220h80"/>
    <path d="M480 275v95"/>
    <path d="M370 425h-80"/>
    <path d="M590 425h80"/>
  </g>
  <g fill="#d8b45f">
    <path d="M363 212l14 8-14 8z"/>
    <path d="M663 212l14 8-14 8z"/>
    <path d="M472 363l8 14 8-14z"/>
    <path d="M297 417l-14 8 14 8z"/>
    <path d="M663 417l14 8-14 8z"/>
  </g>
</svg>
